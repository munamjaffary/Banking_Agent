<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NPFCU – National Progressive Federal Credit Union</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.26/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,600&family=Public+Sans:wght@600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #FBF9F4;
      --assider: #F5F1E8;
      --text: #3F3D38;
      --logintext: #3F3D38;
      --card: #FFFFFF;
      --hover: #EDE7D9;
      --white: #FFFFFF;
      --primary: #0E3B36;
      --primary-light: #6E9C92;
      --accent: #C8A24C;
      --accent-light: #F0E0BC;
      --scroll-bar: #6B6862;
      --Azure-Blue: #0E3B36;
      --Blue-Gray: #9A958A;
      --border-color: #D9D1BF;
      --notification-badge: #C83E3E;
      --font-size-10px: 0.625em;
      --font-size-12px: 0.75em;
      --font-size-14px: 0.875em;
      --font-size-16px: 1em;
      --font-size-18px: 1.125em;
      --font-size-20px: 1.25em;
      --font-size-22px: 1.3em;
      --font-size-26px: 1.625em;
      --font-size-40px: 2.5em;
      --icon-filter: brightness(0);
    }
    [data-theme="dark"] {
      --bg: #0A2C28;
      --text: #F5F1E8;
      --card: #0E3B36;
      --assider: #0E3B36;
      --hover: #10403A;
      --scroll-bar: #9A958A;
      --icon-filter: brightness(0) invert(0.85);
      --action-icon: brightness(0) invert(0.85);
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100vh; width: 100vw; overflow: hidden; font-family: 'Inter', sans-serif; font-size: 16px; background-color: var(--white); color: var(--text); transition: background-color .3s ease, color .3s ease; }
    .app-wrapper { height: 100vh; width: 100vw; display: flex; overflow: hidden; }
    .content-area { display: flex; width: 100%; height: 100%; }
    .sidebar-collapsed, .sidebar-expanded { transition: width .3s cubic-bezier(.4,0,.2,1); flex-shrink: 0; }
    .sidebar-collapsed { width: 55px; }
    .sidebar-expanded { width: 260px; }
    .dashboard-col { flex: 1; min-width: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; background-color: var(--bg); }
    .dashboard-main { flex: 1; overflow-y: auto; padding: 24px 28px; background: var(--bg); }
    .dashboard-main::-webkit-scrollbar { width: 6px; }
    .dashboard-main::-webkit-scrollbar-track { background: transparent; }
    .dashboard-main::-webkit-scrollbar-thumb { background: var(--scroll-bar); border-radius: 3px; }
    .noscrollbar::-webkit-scrollbar { width: 0 !important; }
    .noscrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .custom-scrollbar::-webkit-scrollbar { width: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: var(--scroll-bar); border-radius: 3px; }
    .text-center { text-align: center; }
    .truncate { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .npfcuh-layout { min-height: 100vh; display: flex; flex-direction: column; background: #FBF9F4; overflow-y: auto; }

    /* ===== NPFCU PUBLIC NAV ===== */
    .npfcuh-navbar { position: sticky; top: 0; z-index: 50; background: rgba(251,249,244,.94); backdrop-filter: blur(10px); border-bottom: 1px solid #E3DCCB; padding: 0 28px; }
    .npfcuh-nav-inner { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 56px; }
    .npfcuh-nav-logo { font-family: 'Newsreader', serif; font-size: 20px; font-weight: 600; color: #0E3B36; text-decoration: none; letter-spacing: -.01em; }
    .npfcuh-nav-logo em { font-style: normal; color: #C8A24C; }
    .npfcuh-nav-links { display: flex; align-items: center; gap: 6px; }
    .npfcuh-nav-link { font-size: 13px; font-weight: 500; color: #3F3D38; text-decoration: none; padding: 8px 16px; border-radius: 8px; transition: background .15s; cursor: pointer; background: none; border: none; font-family: inherit; }
    .npfcuh-nav-link:hover { background: #EDE7D9; }
    .npfcuh-nav-link.highlight { background: #0E3B36; color: #F5F1E8; font-weight: 600; }
    .npfcuh-nav-link.highlight:hover { background: #0E3B36; }
    .npfcuh-footer { background: #0E3B36; color: #F5F1E8; padding: 48px 28px 32px; }
    .npfcuh-footer-inner { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap: 36px; }
    .npfcuh-footer h4 { font-family: 'Newsreader', serif; font-size: 17px; font-weight: 500; margin: 0 0 14px; color: #C8A24C; }
    .npfcuh-footer a { display: block; font-size: 13px; color: rgba(245,241,232,.7); text-decoration: none; margin-bottom: 8px; cursor: pointer; background: none; border: none; font-family: inherit; text-align: left; padding: 0; }
    .npfcuh-footer a:hover { color: #F5F1E8; }
    .npfcuh-footer p { font-size: 13px; line-height: 1.6; color: rgba(245,241,232,.6); margin: 0 0 20px; }
    .npfcuh-footer-bottom { max-width: 1200px; margin: 28px auto 0; padding-top: 20px; border-top: 1px solid rgba(245,241,232,.15); display: flex; justify-content: space-between; font-size: 12px; color: rgba(245,241,232,.5); }

    /* ===== ASSIDER ===== */
    .assider { height: 100vh; background: var(--assider); display: flex; flex-direction: column; border-right: 1px solid var(--border-color); position: relative; z-index: 40; }
    .assider-tabs { display: flex; flex-direction: column; height: 100%; width: 100%; }
    .assider-tabs.collapsed { width: 55px; }
    .assiderlogo { display: flex; align-items: center; justify-content: space-between; padding: 12px 12px 8px; min-height: 52px; }
    .logo-box { display: flex; align-items: center; gap: 8px; }
    .logo-box img { width: 28px; height: 28px; }
    .toggle-trigger { width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; border-radius: 8px; cursor: pointer; transition: background .15s; flex-shrink: 0; }
    .toggle-trigger:hover { background: var(--hover); }
    .toggle-trigger img { width: 18px; height: 18px; filter: var(--icon-filter); }
    .toggle-trigger.is-collapsed { margin: 0 auto; }
    .toggle-trigger .hover-logo { display: none; }
    .toggle-trigger.is-collapsed .base-icon { display: none; }
    .toggle-trigger.is-collapsed .hover-logo { display: block; }
    .assider-button-tabs { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .sidebar-scroll-area { flex: 1; overflow-y: auto; padding: 4px 8px; }
    .sidebar-scroll-area::-webkit-scrollbar { width: 3px; }
    .sidebar-scroll-area::-webkit-scrollbar-thumb { background: var(--scroll-bar); border-radius: 2px; }
    .nav-tabs-button { display: flex; align-items: center; gap: 10px; width: 100%; padding: 9px 10px; border: none; border-radius: 8px; background: transparent; color: var(--text); font-size: 13px; font-weight: 500; cursor: pointer; transition: background .15s; font-family: inherit; text-align: left; }
    .nav-tabs-button:hover { background: var(--hover); }
    .nav-tabs-button.active { background: var(--hover); font-weight: 600; color: var(--primary); }
    .nav-tabs-button.active-chat { background: var(--hover); }
    .nav-tabs-button .tab-icon-img { width: 18px; height: 18px; flex-shrink: 0; filter: var(--icon-filter); }
    .nav-tabs-button .tab-label { flex: 1; min-width: 0; }
    .extra-sections { margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border-color); }
    .section-title { display: flex; align-items: center; justify-content: space-between; padding: 8px 10px; font-size: 11px; font-weight: 700; letter-spacing: .04em; text-transform: uppercase; color: var(--Blue-Gray); cursor: default; }
    .section-title.toggle-clickable { cursor: pointer; }
    .section-title img { width: 12px; height: 12px; filter: var(--icon-filter); }
    .project-item { position: relative; }
    .project-item .chat-menu-wrapper { position: absolute; right: 6px; top: 50%; transform: translateY(-50%); opacity: 0; transition: opacity .15s; }
    .project-item:hover .chat-menu-wrapper { opacity: 1; }
    .chat-menu-btn { width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; border: none; background: transparent; cursor: pointer; border-radius: 4px; padding: 0; }
    .chat-menu-btn:hover { background: var(--hover); }
    .chat-menu-btn img { width: 14px; height: 14px; }
    .chat-dropdown-menu { position: absolute; right: 0; top: 100%; background: var(--card); border: 1px solid var(--border-color); border-radius: 8px; box-shadow: 0 4px 16px rgba(0,0,0,.12); z-index: 100; min-width: 130px; overflow: hidden; }
    .chat-dropdown-menu button { display: block; width: 100%; padding: 10px 14px; border: none; background: transparent; font-size: 13px; font-family: inherit; text-align: left; cursor: pointer; color: var(--text); }
    .chat-dropdown-menu button:hover { background: var(--hover); }
    .chat-dropdown-menu button.danger { color: #ef4444; }
    .chat-rename-input { width: 100%; border: 1px solid var(--primary); border-radius: 4px; padding: 4px 8px; font-size: 13px; font-family: inherit; outline: none; background: var(--card); color: var(--text); }
    .assider-footer { border-top: 1px solid var(--border-color); padding: 8px; position: relative; }
    .profile-trigger { display: flex; align-items: center; justify-content: space-between; padding: 6px; border-radius: 8px; cursor: pointer; transition: background .15s; }
    .profile-trigger:hover { background: var(--hover); }
    .profile-info { display: flex; align-items: center; gap: 8px; }
    .avatar, .small-avatar { width: 30px; height: 30px; border-radius: 50%; background: var(--primary); color: #C8A24C; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; flex-shrink: 0; }
    .small-avatar { width: 32px; height: 32px; font-size: 13px; }
    .user-details { display: flex; flex-direction: column; }
    .user-name { font-size: 13px; font-weight: 600; color: var(--text); }
    .upgrade-pill-btn { font-size: 11px; font-weight: 600; color: #0E3B36; background: var(--accent); border: none; padding: 4px 10px; border-radius: 20px; cursor: pointer; }
    .profile-dropdown-menu { position: absolute; bottom: 100%; left: 8px; right: 8px; background: var(--card); border: 1px solid var(--border-color); border-radius: 10px; box-shadow: 0 -4px 20px rgba(0,0,0,.12); z-index: 100; padding: 8px; margin-bottom: 4px; }
    .dropdown-user-info { display: flex; align-items: center; gap: 10px; padding: 8px; }
    .user-meta { display: flex; flex-direction: column; }
    .dropdown-name { font-size: 14px; font-weight: 600; color: var(--text); }
    .dropdown-email { font-size: 11px; color: var(--Blue-Gray); }
    .dropdown-divider { border: none; border-top: 1px solid var(--border-color); margin: 4px 0; }
    .dropdown-item { display: flex; align-items: center; gap: 10px; width: 100%; padding: 10px; border: none; background: transparent; font-size: 13px; cursor: pointer; border-radius: 6px; color: var(--text); font-family: inherit; }
    .dropdown-item:hover { background: var(--hover); }
    .dropdown-item.logout { color: #ef4444; }
    .dropdown-item img { width: 16px; height: 16px; filter: var(--icon-filter); }
    .arrow-icon { transition: transform .2s; }
    .arrow-icon.down { transform: rotate(180deg); }

    /* ===== CHAT CONTAINER ===== */
    .chat-container { display: flex; flex-direction: column; height: 100%; overflow: hidden; }
    .messages-viewport { flex: 1; overflow-y: auto; padding: 20px 16px; }
    .messages-viewport::-webkit-scrollbar { width: 6px; }
    .messages-viewport::-webkit-scrollbar-thumb { background: var(--scroll-bar); border-radius: 3px; }
    .message-row { margin-bottom: 16px; display: flex; flex-direction: column; }
    .message-row.user { align-items: flex-end; }
    .message-row.assistant { align-items: flex-start; }
    .chat-bubble { max-width: 78%; padding: 12px 16px; border-radius: 14px; font-size: 14px; line-height: 1.55; word-wrap: break-word; }
    .user-bubble { background: var(--primary); color: #F5F1E8; border-bottom-right-radius: 4px; }
    .assistant-bubble { background: var(--card); border: 1px solid var(--border-color); border-bottom-left-radius: 4px; }
    .message-content p { margin: 0 0 8px; }
    .message-content p:last-child { margin-bottom: 0; }
    .message-content ul, .message-content ol { margin: 6px 0; padding-left: 20px; }
    .message-content a { color: var(--primary); text-decoration: underline; }
    .error-text { color: #ef4444; }
    .typing-wave { display: flex; gap: 4px; padding: 8px 0; }
    .typing-wave span { width: 7px; height: 7px; border-radius: 50%; background: var(--primary-light); animation: typingBounce 1.4s infinite ease-in-out both; }
    .typing-wave span:nth-child(1) { animation-delay: -.32s; }
    .typing-wave span:nth-child(2) { animation-delay: -.16s; }
    .typing-wave span:nth-child(4) { animation-delay: .16s; }
    @keyframes typingBounce { 0%,80%,100% { transform: scale(.6); } 40% { transform: scale(1); } }
    .msg-actions { display: flex; gap: 4px; margin-top: 6px; }
    .msg-action-btn { display: inline-flex; align-items: center; gap: 4px; padding: 5px 9px; border: 1px solid var(--border-color); border-radius: 6px; background: var(--card); color: var(--Blue-Gray); font-size: 11px; cursor: pointer; transition: all .15s; font-family: inherit; }
    .msg-action-btn:hover { background: var(--hover); color: var(--text); }
    .msg-action-btn.active { background: var(--hover); color: var(--primary); }
    .msg-action-btn .btn-label { font-size: 10px; font-weight: 500; }
    .ref-badge { background: var(--primary); color: #F5F1E8; font-size: 9px; padding: 1px 5px; border-radius: 10px; line-height: 1.4; }
    .sources-section { background: var(--card); border: 1px solid var(--border-color); border-radius: 10px; padding: 12px; margin-top: 6px; width: 100%; max-width: 78%; }
    .sources-title { font-size: 12px; font-weight: 700; color: var(--Blue-Gray); margin-bottom: 8px; text-transform: uppercase; letter-spacing: .04em; }
    .source-item { border-bottom: 1px solid var(--border-color); padding: 8px 0; }
    .source-item:last-child { border-bottom: none; }
    .source-info { display: flex; justify-content: space-between; align-items: center; gap: 10px; }
    .source-left { display: flex; flex-direction: column; gap: 2px; }
    .source-name { font-size: 13px; font-weight: 600; color: var(--text); }
    .source-page { font-size: 11px; color: var(--Blue-Gray); }
    .source-percentage { font-size: 12px; font-weight: 600; color: var(--primary); }
    .source-btns { display: flex; gap: 6px; margin-top: 6px; }
    .source-btns button { padding: 5px 14px; border: none; border-radius: 6px; font-size: 12px; font-weight: 500; cursor: pointer; font-family: inherit; transition: opacity .15s; }
    .view-btn { background: var(--primary); color: #F5F1E8; }
    .download-btn { background: var(--hover); color: var(--text); }
    .view-btn:hover, .download-btn:hover { opacity: .85; }
    .chat-input-section { padding: 12px 16px 16px; border-top: 1px solid var(--border-color); background: var(--bg); }
    .input-wrapper { display: flex; align-items: center; gap: 8px; background: var(--card); border: 1px solid var(--border-color); border-radius: 12px; padding: 4px 4px 4px 16px; }
    .chat-input-field { flex: 1; border: none; outline: none; background: transparent; font-size: 14px; color: var(--text); padding: 10px 0; font-family: inherit; }
    .chat-input-field::placeholder { color: var(--Blue-Gray); }
    .input-actions { display: flex; align-items: center; gap: 4px; }
    .mic-btn, .send-btn-modern { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; border: none; border-radius: 10px; cursor: pointer; transition: all .15s; background: transparent; color: var(--Blue-Gray); }
    .mic-btn:hover, .send-btn-modern:hover { background: var(--hover); color: var(--text); }
    .mic-btn.pulse-red { color: #ff4d4d; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .5; } }
    .send-btn-modern.loading-active { background: #ef4444; color: #fff; }
    .mini-spinner { width: 18px; height: 18px; border: 2px solid var(--border-color); border-top-color: var(--primary); border-radius: 50%; animation: spin .6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .stop-icon { font-size: 14px; line-height: 1; }

    /* ===== AUTH ===== */
    .auth-container { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 40px 20px; background: #FBF9F4; }
    .auth-card { width: 100%; max-width: 420px; background: #fff; border: 1px solid #E3DCCB; border-radius: 20px; padding: 40px 36px; box-shadow: 0 8px 30px rgba(14,59,54,.07); }
    .auth-logo { font-family: 'Newsreader', serif; font-size: 24px; font-weight: 600; color: #0E3B36; text-align: center; margin-bottom: 4px; }
    .auth-logo em { font-style: normal; color: #C8A24C; }
    .auth-subtitle { text-align: center; font-size: 14px; color: #9A958A; margin-bottom: 28px; }
    .auth-field { margin-bottom: 16px; }
    .auth-field label { display: block; font-size: 13px; font-weight: 600; color: #3F3D38; margin-bottom: 5px; }
    .auth-field input { width: 100%; padding: 11px 14px; border: 1px solid #D9D1BF; border-radius: 10px; font-size: 14px; outline: none; font-family: inherit; background: #fff; color: #3F3D38; transition: border-color .15s; }
    .auth-field input:focus { border-color: #0E3B36; }
    .auth-btn { width: 100%; padding: 13px; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; color: #F5F1E8; background: #0E3B36; cursor: pointer; font-family: inherit; transition: opacity .15s; margin-top: 6px; }
    .auth-btn:hover { opacity: .9; }
    .auth-btn:disabled { opacity: .5; cursor: not-allowed; }
    .auth-error { background: #fef2f2; border: 1px solid #fecaca; color: #dc2626; border-radius: 10px; padding: 10px 14px; font-size: 13px; margin-bottom: 16px; }
    .auth-switch { text-align: center; margin-top: 20px; font-size: 13px; color: #9A958A; }
    .auth-switch a { color: #0E3B36; font-weight: 600; cursor: pointer; text-decoration: none; background: none; border: none; font-family: inherit; }
    .auth-loader { text-align: center; padding: 10px; font-size: 14px; color: #9A958A; }

    /* ===== NLU ===== */
    .dashboard-container { height: 100%; display: flex; flex-direction: column; overflow: hidden; }
    .dashboard-headings { margin-bottom: 20px; }
    .dashboard-headings h4 { font-family: 'Newsreader', serif; font-size: 26px; font-weight: 500; color: var(--primary); margin: 0; }
    .dashboard-headings p { font-size: 13px; color: var(--Blue-Gray); margin: 4px 0 0; }
    .nlu-tabs { display: flex; gap: 4px; margin-bottom: 20px; background: var(--hover); border-radius: 10px; padding: 3px; width: fit-content; }
    .nlu-tab { padding: 8px 20px; border: none; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; background: transparent; color: var(--text); font-family: inherit; transition: all .15s; }
    .nlu-tab.active { background: var(--card); color: var(--primary); font-weight: 600; box-shadow: 0 1px 4px rgba(0,0,0,.06); }
    .nlu-analytics-section { flex: 1; overflow-y: auto; }
    .nlu-summary-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
    .nlu-kpi-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; }
    .nlu-kpi-card { background: var(--card); border: 1px solid var(--border-color); border-radius: 12px; padding: 18px; }
    .nlu-kpi-label { display: block; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .04em; color: var(--Blue-Gray); margin-bottom: 6px; }
    .nlu-kpi-value { display: block; font-size: 26px; font-weight: 700; color: var(--text); font-family: 'Public Sans', sans-serif; }
    .nlu-kpi-sub { font-size: 11px; color: var(--Blue-Gray); font-weight: 400; margin-left: 4px; }
    .nlu-donut-container { background: var(--card); border: 1px solid var(--border-color); border-radius: 14px; overflow: hidden; }
    .nlu-donut-header { padding: 16px 20px 0; }
    .nlu-donut-header p { font-size: 14px; font-weight: 600; color: var(--text); margin: 0; }
    .nlu-donut-header span { font-size: 11px; color: var(--Blue-Gray); }
    .nlu-donut-body { padding: 10px 20px 20px; position: relative; }
    .nlu-donut-chart-wrap { position: relative; }
    .nlu-donut-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); text-align: center; pointer-events: none; }
    .nlu-donut-center-value { display: block; font-size: 24px; font-weight: 700; color: var(--text); }
    .nlu-donut-center-label { font-size: 11px; color: var(--Blue-Gray); }
    .nlu-donut-tooltip { background: var(--card); border: 1px solid var(--border-color); border-radius: 8px; padding: 8px 12px; font-size: 12px; box-shadow: 0 2px 10px rgba(0,0,0,.1); }
    .nlu-charts-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; margin-bottom: 20px; }
    .nlu-chart-card { background: var(--card); border: 1px solid var(--border-color); border-radius: 14px; overflow: hidden; }
    .nlu-chart-card-header { padding: 16px 20px 0; }
    .nlu-chart-card-header p { font-size: 14px; font-weight: 600; color: var(--text); margin: 0; }
    .nlu-chart-card-header span { font-size: 11px; color: var(--Blue-Gray); }
    .nlu-chart-card-body { padding: 16px 20px; }
    .nlu-handoff-chart-body { position: relative; }
    .nlu-handoff-center { position: absolute; top: 38%; left: 50%; transform: translate(-50%,-50%); text-align: center; pointer-events: none; }
    .nlu-handoff-legend { display: flex; gap: 16px; justify-content: center; margin-top: 6px; }
    .nlu-handoff-legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text); }

      return <div className="auth-container"><div className="auth-card"><div className="auth-logo">NPFC<em>U</em></div><div className="auth-subtitle">Sign in to your account</div>

    // ===== CHAT AREA =====
    function ChatArea() {
      const { addMessage, updateLastMessage, conversations, activeConvId } = useContext(ChatContext);
      const { token } = useContext(AuthContext);
      const [input, setInput] = useState("");
      const [loading, setLoading] = useState(false);
      const [sessionId, setSessionId] = useState(null);
      const [showRefs, setShowRefs] = useState({});
      const [isRecording, setIsRecording] = useState(false);
      const [isProcessing, setIsProcessing] = useState(false);
      const messagesEndRef = useRef(null);
      const abortRef = useRef(null);
      const mediaRecRef = useRef(null);
      const audioChunksRef = useRef([]);

      useEffect(() => { if (token && !sessionId) { fetch(`${baseUrl}${endpoints.auth.sessionid}`,{method:"POST",headers:{"Content-Type":"application/json",Authorization:`Bearer ${token}`}}).then(r=>r.json()).then(d=>setSessionId(d?.session_id||d)).catch(()=>{}); } }, [token, sessionId]);
      useEffect(() => { messagesEndRef.current?.scrollIntoView({behavior:"smooth"}); }, [conversations, loading]);
      const activeConv = conversations?.find(c => c.id === activeConvId);

      const handleSend = async (overrideText) => {
        const val = (typeof overrideText === "string" ? overrideText : input).trim();
        if (!val || loading || !sessionId || !token) return;
        setInput("");
        if (!activeConvId) return;
        addMessage({convId:activeConvId, message:{role:"user", content:val, references:[]}});
        addMessage({convId:activeConvId, message:{role:"assistant", content:"", references:[]}});
        setLoading(true);
        abortRef.current = new AbortController();
        let accumulated = "";
        try {
          const response = await fetch(`${baseUrl}${endpoints.chat.response}`, {method:"POST", headers:{"Content-Type":"application/json", Authorization:`Bearer ${token}`}, body:JSON.stringify({query:val, session_id:sessionId}), signal:abortRef.current.signal});
          const reader = response.body.getReader();
          const decoder = new TextDecoder();
          let finalRefs = [];
          while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            const text = decoder.decode(value, {stream:true});
            const lines = text.split("\n");
            for (const line of lines) {
              if (line.startsWith("data: ")) {
                try { const parsed = JSON.parse(line.slice(6)); if (parsed.content) { accumulated += parsed.content; updateLastMessage({convId:activeConvId, content:accumulated}); } if (parsed.references?.length) finalRefs = parsed.references; } catch(e) {}
              }
            }
          }
          if (finalRefs.length) updateLastMessage({convId:activeConvId, references:finalRefs});
        } catch (err) { if (err.name !== "AbortError") updateLastMessage({convId:activeConvId, content:`Error: ${err.message}`}); }
        finally { setLoading(false); abortRef.current = null; }
      };
      const abort = () => { abortRef.current?.abort(); setLoading(false); };
      const handleVoiceInput = async () => {
        if (!isRecording) {
          try { const stream = await navigator.mediaDevices.getUserMedia({audio:true}); mediaRecRef.current = new MediaRecorder(stream); audioChunksRef.current = []; mediaRecRef.current.ondataavailable = e => { if (e.data.size > 0) audioChunksRef.current.push(e.data); }; mediaRecRef.current.start(); setIsRecording(true); } catch(e) { console.error("Mic error", e); }
        } else {
          if (!mediaRecRef.current) return;
          setIsProcessing(true);
          mediaRecRef.current.onstop = async () => {
            const blob = new Blob(audioChunksRef.current, {type:"audio/wav"});
            const fd = new FormData(); fd.append("audio", blob, "recording.wav"); fd.append("text", "");
            try { const res = await fetch(`${baseUrl}${endpoints.chat.audio}`, {method:"POST", body:fd}); const data = await res.json(); if (data?.transcription) { setInput(data.transcription); /*handleSend(data.transcription);*/ } } catch(e) { console.error("Audio err", e); }
            finally { setIsRecording(false); setIsProcessing(false); if (mediaRecRef.current?.stream) mediaRecRef.current.stream.getTracks().forEach(t => t.stop()); }
          };
          mediaRecRef.current.stop();
        }
      };
      const handleAction = async (ref, actionType) => {
        try { const res = await fetch(`${baseUrl}${endpoints.chat.reference}`, {method:"POST", headers:{"Content-Type":"application/json", Authorization:`Bearer ${token}`}, body:JSON.stringify({"Document Name":ref.document_name, Page:ref.page})}); const blob = await res.blob(); if (actionType === "view") { window.open(URL.createObjectURL(blob), "_blank"); } else { downloadFileFromBlob(blob, ref.document_name); } } catch(e) { console.error("Ref err", e); }
      };
      const handleCopy = async (content) => { try { await navigator.clipboard.writeText(content); } catch(e) {} };
      const handleDownloadContent = (content) => { downloadFileFromBlob(new Blob([content],{type:"text/plain"}), "response.txt"); };
      const handleRetry = (msgIdx) => { for (let i=msgIdx-1; i>=0; i--) { if (activeConv.messages[i].role === "user") { handleSend(activeConv.messages[i].content); break; } } };
      const toggleRefs = (idx) => setShowRefs(prev => ({...prev, [idx]: !prev[idx]}));
      return <div className="chat-container">
        <div className="messages-viewport custom-scrollbar">
          {activeConv?.messages.map((msg, idx) => <div key={idx} className={`message-row ${msg.role==="user"?"user":"assistant"}`}>
            <div className={`chat-bubble ${msg.role==="user"?"user-bubble":"assistant-bubble"}`}>
              {msg.role==="assistant" && !msg.content && loading && idx===activeConv.messages.length-1 ? <div className="typing-wave"><span/><span/><span/><span/></div>
              : <div className={`message-content ${msg.content?.includes("Error:")?"error-text":""}`} style={{whiteSpace:"pre-wrap"}}>{msg.content}</div>}
            </div>
            {msg.role==="assistant" && msg.references?.length > 0 && showRefs[idx] && <div className="sources-section"><div className="sources-title">Chat References</div>{msg.references.map((ref,rIdx)=><div key={rIdx} className="source-item"><div className="source-info"><div className="source-left"><span className="source-name">{ref.document_name}</span><span className="source-page">Page: {ref.page}</span></div></div><div className="source-btns"><button onClick={()=>handleAction(ref,"view")} className="view-btn">View</button><button onClick={()=>handleAction(ref,"download")} className="download-btn">Download</button></div></div>)}</div>}
            {msg.role==="assistant" && msg.content && <div className="msg-actions">
              <button onClick={()=>handleCopy(msg.content)} className="msg-action-btn" title="Copy"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg><span className="btn-label">Copy</span></button>
              <button onClick={()=>handleDownloadContent(msg.content)} className="msg-action-btn" title="Download"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg><span className="btn-label">Download</span></button>
              <button onClick={()=>handleRetry(idx)} className="msg-action-btn" title="Retry"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg><span className="btn-label">Retry</span></button>

    const intentColors = {rates:"#008fd5",hours:"#009591",loans:"#f59e0b",membership:"#8b5cf6",payments:"#10b981",cards:"#ef4444",fraud:"#dc2626",account:"#6366f1",general:"#6b7280"};
    function DonutChart({data, size=220, inner=60, outer=80}) {
      const total = data.reduce((s,d)=>s+d.value,0);
      if (total===0) return <div style={{textAlign:"center",padding:20,color:"var(--Blue-Gray)"}}>No data</div>;
      let cumulative = 0;
      const slices = data.map(d => { const start = cumulative; const pct = d.value/total; cumulative += pct * 360; return {...d, startAngle: start, endAngle: cumulative, pct}; });
      const cx=size/2, cy=size/2;
      function polarToCartesian(cx,cy,r,angleDeg) { const rad = (angleDeg-90)*Math.PI/180; return {x:cx+r*Math.cos(rad),y:cy+r*Math.sin(rad)}; }
      function describeArc(cx,cy,r,start,end) { const s=polarToCartesian(cx,cy,r,start); const e=polarToCartesian(cx,cy,r,end); const large=(end-start)>=180?1:0; return `M ${s.x} ${s.y} A ${r} ${r} 0 ${large} 1 ${e.x} ${e.y}`; }
      return <div style={{position:"relative",width:size,height:size,margin:"0 auto"}}><svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
        {slices.map((d,i)=><path key={i} d={describeArc(cx,cy,outer,d.startAngle,d.endAngle)} fill="none" stroke={d.color||"#ccc"} strokeWidth={outer-inner}/>)}
        <circle cx={cx} cy={cy} r={inner} fill="var(--card)"/>
      </svg><div style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)",textAlign:"center",pointerEvents:"none"}}><span style={{display:"block",fontSize:20,fontWeight:700,color:"var(--text)"}}>{total}</span><span style={{fontSize:11,color:"var(--Blue-Gray)"}}>Total</span></div></div>;

      const totalDocuments = docs.length;
      const activeDocs = docs.filter(d=>d.status!=="archived"&&d.status!=="deleted").length;
      const categories = [...new Set(docs.map(d=>d.category||"Uncategorized"))];
      const recentUploads = [...docs].sort((a,b)=>new Date(b.createdAt||0)-new Date(a.createdAt||0)).slice(0,5);
      const categoryCounts = {}; docs.forEach(d=>{const c=d.category||"Uncategorized"; categoryCounts[c]=(categoryCounts[c]||0)+1});
      const statusCounts = {}; docs.forEach(d=>{const s=d.status||"unknown"; statusCounts[s]=(statusCounts[s]||0)+1});
      const statusColors = {approved:"#10b981",pending:"#f59e0b",archived:"#6b7280",deleted:"#ef4444",active:"#10b981",inactive:"#6b7280"};
      const kpis = [{label:"Total Documents",value:String(totalDocuments),sub:`${docs.length} loaded`},{label:"Active Docs",value:String(activeDocs),sub:`${categories.length} categories`},{label:"Categories",value:String(categories.length),sub:categories.slice(0,3).join(", ")+(categories.length>3?" ...":"")},{label:"Avg Rating",value:"4.2",sub:"/ 5.0 from 89 reviews"},{label:"Uploads Today",value:"12",sub:"+3 vs yesterday"},{label:"Top Contributor",value:"Sarah",sub:"24 docs this month"}];
      return <div className="dashboard-container"><div className="dashboard-headings"><h4>Knowledge Base</h4><p>Overview of system metrics, activity logs, and insights</p></div>
        <div className="nlu-tabs">{[{key:"dashboard",label:"Dashboard"},{key:"activity",label:"Activity"}].map(t=><button key={t.key} className={`nlu-tab ${activeTab===t.key?"active":""}`} onClick={()=>setActiveTab(t.key)}>{t.label}</button>)}</div>
        {activeTab==="dashboard" && <div className="kb-dashboard">
          <div className="kb-kpi-grid">{kpis.map(k=><div key={k.label} className="kb-kpi-card"><span className="kb-kpi-label">{k.label}</span><span className="kb-kpi-value">{k.value}</span><span className="kb-kpi-sub">{k.sub}</span></div>)}</div>
          <div className="kb-charts-row">
            <div className="kb-chart-card"><div className="kb-chart-header"><p>Documents by Category</p><span>Distribution across categories</span></div><div className="kb-chart-body">{Object.keys(categoryCounts).length>0?<div style={{display:"flex",justifyContent:"center"}}><DonutChart data={Object.entries(categoryCounts).map(([k,v],i)=>({name:k,value:v,color:["#008fd5","#009591","#8b5cf6","#f59e0b","#10b981","#ef4444","#6366f1"][i%7]}))}/></div>:<div className="kb-loading">No data</div>}</div></div>
            <div className="kb-chart-card"><div className="kb-chart-header"><p>Document Status</p><span>Status breakdown</span></div><div className="kb-chart-body">{Object.keys(statusCounts).length>0?<div style={{display:"flex",justifyContent:"center"}}><DonutChart data={Object.entries(statusCounts).map(([k,v])=>({name:k,value:v,color:statusColors[k]||"#6b7280"}))}/></div>:<div className="kb-loading">No data</div>}</div></div>
          </div>
          <div className="kb-charts-row">
            <div className="kb-chart-card"><div className="kb-chart-header"><p>Recent Uploads</p><span>Latest documents added</span></div><div className="kb-chart-body">{recentUploads.length===0?<div className="kb-loading">No documents uploaded yet</div>:<div className="kb-recent-list">{recentUploads.map((doc,i)=>{const name=doc.filename||doc.name||doc._id||"Untitled"; const ext=name.includes(".")?name.split(".").pop().toUpperCase():"—"; const uploader=doc.uploaded_by?.name||doc.uploaded_by||doc.uploader||"Unknown"; const time=doc.createdAt?(()=>{const diff=Date.now()-new Date(doc.createdAt).getTime(); const hrs=Math.floor(diff/3600000); if(hrs<1)return"Just now"; if(hrs<24)return `${hrs}h ago`; return `${Math.floor(hrs/24)}d ago`})():""; return <div key={doc._id||i} className="kb-recent-row"><span className="kb-recent-ext">{ext}</span><div className="kb-recent-info"><span className="kb-recent-name">{name}</span><span className="kb-recent-meta">{uploader} · {time}</span></div></div>})}</div>}</div></div>
          </div>
        </div>}
        {activeTab==="activity" && <div className="kb-dashboard" style={{marginTop:16}}>
          <div className="kb-kpi-grid">{kpis.slice(0,3).map(k=><div key={k.label} className="kb-kpi-card"><span className="kb-kpi-label">{k.label}</span><span className="kb-kpi-value">{k.value}</span><span className="kb-kpi-sub">{k.sub}</span></div>)}</div>
        </div>}
      </div>;
    }

    // ===== SEARCH PAGE =====

    // ===== FLOATING CHAT WIDGET =====
    function FloatingChatWidget() {
      const [open, setOpen] = useState(false);
      const [input, setInput] = useState("");
      const [sessionId, setSessionId] = useState(null);
      const { token, user } = useContext(AuthContext);
      const { conversations, activeConvId, createNewChat, addMessage, updateLastMessage } = useContext(ChatContext);
      const messagesEndRef = useRef(null);
      const inputRef = useRef(null);
      const activeConv = conversations?.find(c=>c.id===activeConvId);
      useEffect(()=>{if(token&&!sessionId){fetch(`${baseUrl}${endpoints.chat.retrieval}`,{method:"POST",headers:{"Content-Type":"application/json",Authorization:`Bearer ${token}`}}).then(r=>r.json()).then(d=>setSessionId(d.session_id||d.sessionId||null)).catch(()=>{})}},[token,sessionId]);
      useEffect(()=>{messagesEndRef.current?.scrollIntoView({behavior:"smooth"})},[activeConv?.messages]);
      useEffect(()=>{if(!conversations.length)createNewChat()},[conversations.length,createNewChat]);
      useEffect(()=>{if(open&&inputRef.current)setTimeout(()=>inputRef.current?.focus(),300)},[open]);
      const handleSend = useCallback(async()=>{const val=input.trim();if(!val||!sessionId||!token)return; setInput(""); if(!activeConv)createNewChat(); addMessage({convId:activeConvId,message:{role:"user",content:val,references:[]}}); addMessage({convId:activeConvId,message:{role:"assistant",content:"",references:[]}}); try{const response=await fetch(`${baseUrl}${endpoints.chat.response}`,{method:"POST",headers:{"Content-Type":"application/json",Authorization:`Bearer ${token}`},body:JSON.stringify({query:val,session_id:sessionId})}); const reader=response.body.getReader(); const decoder=new TextDecoder(); let fc=""; while(true){const{done,value}=await reader.read(); if(done)break; const text=decoder.decode(value,{stream:true}); const lines=text.split("\n"); for(const line of lines){if(line.startsWith("data: ")){try{const parsed=JSON.parse(line.slice(6)); if(parsed.content){fc+=parsed.content; updateLastMessage({convId:activeConvId,content:fc})}}catch(e){}}}} }catch(err){if(err.name!=="AbortError"){}}},[input,sessionId,token,activeConv,activeConvId,addMessage,updateLastMessage,createNewChat]);
      return <><button className="npfcucw-trigger" onClick={()=>setOpen(p=>!p)} aria-label="Toggle chat">{open?<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>:<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>}</button>
      {open && <div className="npfcucw-panel"><div className="npfcucw-header"><div className="npfcucw-header-brand"><span className="npfcucw-header-icon">◆</span><div><span className="npfcucw-header-title">NPFCU Assistant</span><span className="npfcucw-header-sub">AI-powered support</span></div></div><button className="npfcucw-close" onClick={()=>setOpen(false)}><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>
        <div className="npfcucw-messages">{!user&&<div className="npfcucw-login-prompt"><p>Please sign in to use the chat assistant.</p></div>}
          {activeConv?.messages?.map((msg,i)=><div key={i} className={`npfcucw-msg npfcucw-msg-${msg.role}`}>{msg.role==="assistant"&&<div className="npfcucw-msg-avatar">◆</div>}<div className="npfcucw-msg-bubble">{msg.content||(msg.role==="assistant"?"Thinking...":"")}</div></div>)}
          <div ref={messagesEndRef}/>
        </div>
        <div className="npfcucw-input-bar"><input ref={inputRef} className="npfcucw-input" placeholder={user?"Type your message...":"Sign in to chat"} value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();handleSend()}}} disabled={!user}/><button className="npfcucw-send" onClick={handleSend} disabled={!input.trim()||!user}><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg></button></div>
      </div>}
      </>;
    }

    // ===== ASSIDER (Sidebar) =====
    function Assider({ collapsed, setCollapsed, activeTab, setActiveTab }) {
      const { user, logout } = useContext(AuthContext);
      const { conversations, activeConvId, createNewChat, selectChat, renameChat, deleteChat } = useContext(ChatContext);
      const navigate = useNavigate();
      const [menuOpenId, setMenuOpenId] = useState(null);
      const [renameId, setRenameId] = useState(null);
      const [renameValue, setRenameValue] = useState("");
      const [showProfileMenu, setShowProfileMenu] = useState(false);
      const [isProjectsOpen, setIsProjectsOpen] = useState(true);
      const menuRef = useRef(null);
      const renameRef = useRef(null);
      useEffect(() => { const h = (e) => { if (menuRef.current && !menuRef.current.contains(e.target)) setShowProfileMenu(false); }; document.addEventListener("mousedown", h); return () => document.removeEventListener("mousedown", h); }, []);
      useEffect(() => { if (renameId && renameRef.current) { renameRef.current.focus(); renameRef.current.select(); } }, [renameId]);
      const mainTabs = [
        {key:"newchat", label:"New Chat"},
        {key:"chat", label:"Chats", path:"/portal/chat"},
        {key:"search", label:"Search", path:"/portal/search"},
        {key:"knowledgebase", label:"Knowledge Base", path:"/portal/kb"},
        {key:"document", label:"Document View", path:"/portal/documents"},
        {key:"nlu", label:"NLU Engine", path:"/portal/nlu"},
      ];
      const handleTabClick = (tab) => {
        if (tab.key === "newchat") { createNewChat(); setActiveTab("chat"); navigate("/portal/chat"); }
        else { setActiveTab(tab.key); navigate(tab.path); }
      };
      const handleSelectChat = (id) => { selectChat(id); setActiveTab("chat"); navigate("/portal/chat"); };
      const getInitials = (name) => name ? name.split(" ").map(n=>n[0]).join("").toUpperCase() : "T";
      const startRename = (chat) => { setRenameValue(chat.messages.length > 0 ? chat.messages[0].content : chat.title); setRenameId(chat.id); setMenuOpenId(null); };
      const submitRename = () => { if (renameValue.trim() && renameId) renameChat({id:renameId, title:renameValue.trim()}); setRenameId(null); setRenameValue(""); };
      const handleDownloadChat = (chat) => {
        try { const { jsPDF } = window.jspdf; const doc = new jsPDF(); const margin=15, pageWidth=doc.internal.pageSize.getWidth(); let y=margin;
          const title = chat.messages.length > 0 ? chat.messages[0].content : chat.title; doc.setFontSize(16); doc.text(title,margin,y); y+=8;
          doc.setFontSize(10); doc.setTextColor(100); doc.text(`Downloaded: ${new Date().toLocaleDateString("en-US",{year:"numeric",month:"long",day:"numeric",hour:"2-digit",minute:"2-digit"})}`,margin,y); y+=10;
          doc.setDrawColor(200); doc.line(margin,y,pageWidth-margin,y); y+=8;
          for (const msg of chat.messages) { if (y>270) { doc.addPage(); y=margin; } const role=msg.role==="user"?"You":"Assistant"; doc.setFontSize(11); doc.setFont(undefined,"bold"); doc.setTextColor(msg.role==="user"?"#009591":"#333"); doc.text(`${role}:`,margin,y); y+=6; doc.setFont(undefined,"normal"); doc.setFontSize(10); doc.setTextColor(60); const lines=doc.splitTextToSize(msg.content||"",pageWidth-margin*2); for (const l of lines) { if (y>275) { doc.addPage(); y=margin; } doc.text(l,margin,y); y+=5; } y+=4; }
          doc.save(`${title.substring(0,40)}.pdf`);
        } catch(e) { console.error("PDF download error", e); }
      };
      const handleLogout = () => { logout(); navigate("/"); };
      return <aside className="assider">
        <div className={`assider-tabs ${collapsed?"collapsed":""}`}>
          <div className="assiderlogo">
            {!collapsed && <div className="logo-box"><span style={{fontFamily:"'Newsreader', serif",fontSize:"18px",fontWeight:"600",color:"#0E3B36"}}>NPFC<em style={{fontStyle:"normal",color:"#C8A24C"}}>U</em></span></div>}
            <div className={`toggle-trigger ${collapsed?"is-collapsed":""}`} onClick={()=>setCollapsed(!collapsed)}>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" style={{filter:"var(--icon-filter)"}}>{collapsed?<><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="9" x2="15" y2="15"/><line x1="15" y1="9" x2="9" y2="15"/></>:<><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></>}</svg>
            </div>
          </div>
          <nav className="assider-button-tabs"><div className="sidebar-scroll-area">
            {mainTabs.map(tab => <button key={tab.key} className={`nav-tabs-button ${activeTab===tab.key?"active":""}`} onClick={()=>handleTabClick(tab)}>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" style={{filter:"var(--icon-filter)",flexShrink:0}}>
                {tab.key==="newchat"?<><path d="M12 5v14M5 12h14"/></>:tab.key==="chat"?<><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></>:tab.key==="search"?<><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></>:tab.key==="knowledgebase"?<><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></>:tab.key==="document"?<><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/></>:<><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></>}
              </svg>

                  </button>
                  {menuOpenId===chat.id && <div className="chat-dropdown-menu">

                  </div>}

            </div>}
          </div></nav>
          <div className="assider-footer" ref={menuRef}>
            {showProfileMenu && !collapsed && <div className="profile-dropdown-menu">

              <hr className="dropdown-divider"/>
              <button className="dropdown-item"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" style={{filter:"var(--icon-filter)"}}><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg> Settings</button>
              <hr className="dropdown-divider"/>
              <button className="dropdown-item logout" onClick={handleLogout}><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg> Log Out</button>
            </div>}
            <div className="profile-trigger" onClick={()=>setShowProfileMenu(!showProfileMenu)}>
              <div className="profile-info"><div className="avatar">{user?.username?getInitials(user.username):"AA"}</div>{!collapsed && <div className="user-details"><span className="user-name">{user?.username||"User"}</span></div>}</div>
              {!collapsed && <button className="upgrade-pill-btn">Upgrade</button>}
            </div>
          </div>
        </div>
      </aside>;
    }

    // ===== PORTAL LAYOUT =====
    function PortalLayout() {
      const [collapsed, setCollapsed] = useState(false);
      const [activeTab, setActiveTab] = useState("chat");
      const { dark, setDark } = useContext(ThemeContext);
      return <div className="app-wrapper">
        <div className="content-area">
          <div className={collapsed?"sidebar-collapsed":"sidebar-expanded"}>
            <Assider collapsed={collapsed} setCollapsed={setCollapsed} activeTab={activeTab} setActiveTab={setActiveTab}/>
          </div>
          <div className="dashboard-col">
            <div className="dashboard-main">
              <div style={{display:"flex",alignItems:"center",justifyContent:"flex-end",padding:"0 0 12px",gap:"12px"}}>
                <button onClick={()=>setDark(!dark)} style={{padding:"6px 12px",border:"1px solid var(--border-color)",borderRadius:"8px",background:"var(--card)",color:"var(--text)",cursor:"pointer",fontSize:"12px",fontWeight:"500",fontFamily:"inherit",display:"flex",alignItems:"center",gap:"6px"}}>
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                  {dark?"Light":"Dark"}
                </button>
              </div>
              <Routes>
                <Route path="/portal/chat" element={<ChatArea/>}/>
                <Route path="/portal/documents" element={<DocumentTable/>}/>
                <Route path="/portal/nlu" element={<NLUPage/>}/>
                <Route path="/portal/kb" element={<KnowledgeBasePage/>}/>
                <Route path="/portal/search" element={<SearchPage/>}/>
                <Route path="/portal" element={<ChatArea/>}/>
              </Routes>
            </div>
          </div>
        </div>
        <FloatingChatWidget/>
      </div>;
    }

    // ===== NPFCU PUBLIC LAYOUT =====
    function NPFCULayout() {
      const location = useLocation();
      const { user } = useContext(AuthContext);
      const navigate = useNavigate();
      const isPublic = location.pathname.startsWith("/npfcu/") || location.pathname === "/npfcu";
      if (!isPublic) return null;
      const navLinks = [
        { label: "Home", path: "/npfcu" },
        { label: "Loans", path: "/npfcu/loans" },
        { label: "Rates", path: "/npfcu/rates" },
        { label: "About", path: "/npfcu/about" },
        { label: "Contact", path: "/npfcu/contact" },
        { label: "Membership", path: "/npfcu/membership" },
      ];
      return <div className="npfcuh-layout">
        <nav className="npfcuh-navbar"><div className="npfcuh-nav-inner">
          <Link to="/npfcu" className="npfcuh-nav-logo">NPFC<em>U</em></Link>
          <div className="npfcuh-nav-links">
            {navLinks.map(l => <Link key={l.path} to={l.path} className="npfcuh-nav-link" style={{fontWeight: location.pathname === l.path ? "600" : "500", color: location.pathname === l.path ? "#0E3B36" : undefined}}>{l.label}</Link>)}
            {user ? <button onClick={()=>navigate("/portal/chat")} className="npfcuh-nav-link highlight">Dashboard</button>
              : <button onClick={()=>navigate("/login")} className="npfcuh-nav-link highlight">Sign In</button>}
          </div>
        </div></nav>
        <main><Routes>
          <Route path="/npfcu" element={<HomePage/>}/>
          <Route path="/npfcu/loans" element={<LoansPage/>}/>
          <Route path="/npfcu/rates" element={<RatesPage/>}/>
          <Route path="/npfcu/about" element={<AboutPage/>}/>
          <Route path="/npfcu/contact" element={<ContactPage/>}/>
          <Route path="/npfcu/membership" element={<MembershipPage/>}/>
        </Routes></main>
        <footer className="npfcuh-footer">
          <div className="npfcuh-footer-inner">
            <div><h4>NPFCU</h4><p>National Progressive Federal Credit Union. Member-owned, community-focused since 1984.</p><p>Federally insured by NCUA. Equal Housing Lender.</p></div>
            <div><h4>Services</h4>{["Savings","Loans","Credit Cards","Mortgages"].map(l=><Link key={l} to="/npfcu/loans">{l}</Link>)}</div>
            <div><h4>Resources</h4>{["Rates","Calculators","Apply","FAQ"].map(l=><Link key={l} to="/npfcu/rates">{l}</Link>)}</div>
            <div><h4>Company</h4>{["About","Contact","Careers","Privacy"].map(l=><Link key={l} to="/npfcu/about">{l}</Link>)}</div>
          </div>
          <div className="npfcuh-footer-bottom"><span>&copy; 2026 NPFCU. All rights reserved.</span><span>Routing # 314-077-892</span></div>
        </footer>
      </div>;
    }

    // ===== MAIN APP =====
    function App() {
      const { user } = useContext(AuthContext);
      return <HashRouter>
        <Routes>
          <Route path="/" element={<Navigate to="/npfcu" replace/>}/>
          <Route path="/npfcu/*" element={<NPFCULayout/>}/>
          <Route path="/login" element={user?<Navigate to="/portal/chat" replace/>:<LoginPage/>}/>
          <Route path="/signup" element={user?<Navigate to="/portal/chat" replace/>:<SignupPage/>}/>
          <Route path="/portal/*" element={user?<PortalLayout/>:<Navigate to="/login" replace/>}/>
        </Routes>
      </HashRouter>;
    }

    // ===== RENDER =====
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(
      <ThemeProvider>
        <AuthProvider>
          <ChatProvider>
            <App/>
          </ChatProvider>
        </AuthProvider>
      </ThemeProvider>
    );
  </script>
</body>
</html>
